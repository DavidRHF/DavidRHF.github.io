  <style>
    :root {
      --bg: #0b0f14;
      --panel: #0f1520;
      --accent: #5ac8fa;
      --text: #e6edf3;
      --muted: #9fb3c8;
      --card: #111827;
      --link: #7dd3fc;
      --border: #1f2937;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.7;
    }

    .wrap {
      max-width: 950px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }

    header {
      background: linear-gradient(180deg, var(--panel), rgba(15,21,32,0.6));
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 24px;
    }

    header h1 {
      margin: 0;
      font-size: 2rem;
    }

    header p {
      margin-top: 10px;
      color: var(--muted);
    }

    .content {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
    }

    a {
      color: var(--link);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    h1, h2, h3 {
      color: var(--text);
    }

    h2 {
      margin-top: 36px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }

    ul {
      padding-left: 22px;
    }

    li {
      margin: 8px 0;
    }

    code {
      background: #111827;
      padding: 2px 6px;
      border-radius: 6px;
    }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 32px 0;
    }

    footer {
      margin-top: 30px;
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
    }
  </style>
</head>
