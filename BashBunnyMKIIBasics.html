# Bash Bunny MKII

*This device tricks computers by emulating a variety of USB devices such as keyboards, network adapters and storage drives. By deploying pre-written payloads in an insertable MicroSD chip, specific tasks can be forced onto another device.*

If anybody gets confused, the link to the official Bash Bunny help page is right here:

[Bash Bunny Help](https://docs.hak5.org/bash-bunny/bash-bunny-by-hak5/)

---

## Steps to setting up the Bash Bunny MKII correctly

*Before looking into and executing attacks, we need to download the latest firmware onto the Bash Bunny.*

### Required Hardware

- Bash Bunny MKII
- MicroSD card

### Setup Instructions

- Insert the MicroSD card into your device
- Download the latest firmware:
  [Bash Bunny MKII Firmware](https://downloads.hak5.org/bunny/mk2)
- Move the downloaded firmware to the MicroSD card
- Safely eject the MicroSD card
- Insert the MicroSD into the Bash Bunny MKII
- Plug the Bash Bunny into the target system
- Wait 2-5 minutes for firmware flashing

![Picture 1](images/BashBunnyMKII-Photo1.png)

### LED Indicators

| LED | Meaning | Safe to Unplug? |
|---|---|---|
| Green | Booting up | Yes |
| Blue | Arming mode | Yes |
| Red | Recovery mode or firmware flashing | No |
| Red/Blue alternating | Firmware flashing | No |

Once complete, the Bash Bunny should contain the correct folder structure.

![Picture 2](images/BashBunnyMKII-Photo2.png)

---

## File Setup

*For the Bash Bunny MKII to store and execute commands, we need a payloads folder with folders for each switch.*

- Match the exact folder naming scheme
- Payloads will execute depending on switch position

---

## Practice Attacks

*We will go over two beginner Ducky Script payloads.*

---

## First Attack: Notepad String

\`\`\`
ATTACKMODE HID
LED B SLOW
QUACK DELAY 1000
RUN WIN notepad.exe
QUACK DELAY 3000
QUACK STRING Hello World!!!
QUACK ENTER
QUACK STRING Bye World...
QUACK CTRL a
QUACK BACKSPACE
QUACK ALT F4
\`\`\`

### Explanation

\`ATTACKMODE HID\`
- Emulates a USB keyboard

\`LED B SLOW\`
- Slow blinking blue LED

\`RUN WIN notepad.exe\`
- Opens Notepad

\`QUACK STRING Hello World!!!\`
- Types text into Notepad

\`QUACK CTRL a\`
- Selects all text

\`QUACK BACKSPACE\`
- Deletes text

\`QUACK ALT F4\`
- Closes Notepad

---

## Second Attack: Save then Delete a File

\`\`\`
ATTACKMODE HID
LED G FAST
RUN WIN notepad.exe
QUACK STRING Important information!
QUACK CTRL s
QUACK STRING %USERPROFILE%\\\\Documents\\\\Target
QUACK ENTER

LED R SLOW
RUN WIN cmd.exe
QUACK STRING del Target.txt
QUACK ENTER
\`\`\`

### New Commands

\`LED G FAST\`
- Indicates phase one

\`CTRL s\`
- Opens save menu

\`%USERPROFILE%\`
- Expands to current user directory

\`del Target.txt\`
- Deletes the created file

---

## Troubleshooting

Some systems block unauthorized USB execution.

### Possible Fixes

- Open:
  \`gpedit.msc\`

- Navigate to removable storage settings

- Disable:
  - Deny execute access
  - Deny write access

This allows unrestricted USB execution.

---

## Prevention Techniques

### Disable or Restrict USB Ports

- Disable unused USB ports in BIOS/UEFI
- Use endpoint protection tools

### Monitor HID Devices

- Block unknown keyboards
- Detect unusual keystroke injection behavior

### Network Adapter Monitoring

- Monitor DHCP changes
- Detect rogue USB Ethernet adapters

### Physical Security & User Training

- Avoid plugging in unknown USB devices
- Lock workstations when unattended
