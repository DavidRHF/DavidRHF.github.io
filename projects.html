<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Projects</title>

  <link rel="preconnect" href="https://cdn.jsdelivr.net" />

  <style>
    :root {
      --bg: #0b1120;
      --panel: #111827;
      --panel-2: #172033;
      --text: #e5edf7;
      --muted: #9fb0c7;
      --accent: #67d3ff;
      --border: #243041;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;

      background:
        radial-gradient(circle at top left, #13203a, transparent 30%),
        radial-gradient(circle at bottom right, #0f1d34, transparent 25%),
        var(--bg);

      color: var(--text);

      font-family:
        Inter,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;

      line-height: 1.7;
    }

    .topnav {
      display: flex;
      gap: 14px;
    
      margin-bottom: 20px;
    }
    
    .topnav a {
      padding: 10px 16px;
    
      background: rgba(17, 24, 39, 0.9);
    
      border: 1px solid var(--border);
    
      border-radius: 12px;
    
      color: var(--text);
    
      text-decoration: none;
    
      transition: 0.2s ease;
    }
    
    .topnav a:hover {
      background: var(--panel-2);
    
      color: white;
    
      transform: translateY(-1px);
    }
    
    
    .wrap {
      max-width: 1000px;
      margin: auto;
      padding: 40px 20px 80px;
    }

    .content {
      background: rgba(17, 24, 39, 0.9);

      backdrop-filter: blur(10px);

      border: 1px solid var(--border);

      border-radius: 20px;

      padding: 40px;

      box-shadow:
        0 10px 40px rgba(0,0,0,0.35);
    }

    h1 {
      font-size: 2.6rem;
      margin-top: 0;
      margin-bottom: 10px;
    }

    h2 {
      margin-top: 48px;
      padding-bottom: 10px;

      border-bottom: 1px solid var(--border);

      font-size: 1.5rem;
    }

    p {
      color: var(--muted);
    }

    ul {
      padding-left: 20px;
    }

    li {
      margin: 12px 0;
    }

    a {
      color: var(--accent);
      text-decoration: none;

      transition: 0.2s ease;
    }

    a:hover {
      color: white;
      text-decoration: underline;
    }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 40px 0;
    }

    code {
      background: #0f172a;

      border: 1px solid var(--border);

      padding: 2px 7px;
      border-radius: 6px;
    }

    /* Navigation Pills */
    .content ul:first-of-type {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;

      list-style: none;
      padding-left: 0;
      margin-top: 20px;
    }

    .content ul:first-of-type li {
      margin: 0;
    }

    .content ul:first-of-type a {
      display: inline-block;

      padding: 10px 16px;

      background: var(--panel-2);

      border: 1px solid var(--border);

      border-radius: 999px;

      font-size: 0.95rem;
      font-weight: 600;

      text-decoration: none;
    }

    .content ul:first-of-type a:hover {
      background: #1d2a40;
      transform: translateY(-1px);
    }

    footer {
      margin-top: 30px;

      text-align: center;

      color: var(--muted);

      font-size: 0.9rem;
    }

    @media (max-width: 700px) {
      .content {
        padding: 24px;
      }

      h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>

<body>

  <div class="wrap">

    <nav class="topnav">
      <a href="index.html">Home</a>
      <a href="labs.html">Labs</a>
    </nav>
    
    <div id="content" class="content"></div>

    <footer>
      Built with HTML + Markdown rendering for GitHub Pages
    </footer>

  </div>

  <!-- Markdown Parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <script>
    const markdown = `
# Projects

A collection of internships, academic, and cyber security related projects.

## Key

- [Internship: Pen-Testing](#cyber-security)
- [Software Development](#software-development)
- [Networking](#networking)

---

## Internship: Pen-Testing

Projects related to penetration testing, system hardening, and security analysis. Shown attacks require a physical Bash Bunny MKII.

#### Pre-Device testing and setup 
- [Password Strength Analyzer](PentestingInternship/DomainControllerNameChange.html)
- [Lab 1: Identifying Lateral Movement](PentestingInternship/Lab1:IdentifyingLateralMovement.html)
- [Lab 2: Detecting Persistence](PentestingInternship/Lab2:DetectingLateralMovement.html)

#### Bash Bunny MKII (Advanced Walkthrough in progress)
- [BashBunnyMKII Device Walkthrough](PentestingInternship/BashBunnyMKIIBasics.html)

---
`;

    marked.setOptions({
      breaks: true,
      headerIds: true,
      mangle: false
    });

    document.getElementById("content").innerHTML =
      marked.parse(markdown);
  </script>

</body>
</html>
